name: CI

on:
  push:
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

      - name: Validate notebook
        run: python scripts/validate_notebook.py Python3finale.ipynb

      - name: Pattern audit
        run: python scripts/audit_notebook_patterns.py Python3finale.ipynb

      - name: Offline smoke
        run: python scripts/smoke_e2e.py

      - name: CLI smoke
        run: python -m rag_pipeline.cli smoke
